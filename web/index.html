<!DOCTYPE html>
<html lang="en">
<head>
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="My portfolio created in flutter">

    <!-- iOS meta tags & icons -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="portfolio">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png"/>

    <title>Pablo Stefan</title>
    <link rel="manifest" href="manifest.json">

    <!-- This script adds the flutter initialization JS code -->
</head>
<body>
<style>
    body {
        background-color: #0A0A0A;
        height: 100vh;
        width: 100vw;
        position: fixed;
        inset: 0;
        overflow: hidden;
        padding: 0;
        margin: 0;
        user-select: none;
        touch-action: none;
    }

    .main-content {
        height: 100%;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity .4s ease-out;
    }

    img {
        width: 100px;
        height: 100px;
        position: absolute;
    }

    p {
        color: #fff;
    }


    .loader {
        position: relative;
        width: 250px;
        height: 250px;
        border-radius: 50%;
        background: linear-gradient(#607B96, #43D9AD, #607B96, #43D9AD);
        animation: animate 1.2s linear infinite;
    }

    @keyframes animate {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }

    .loader span {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 60%;
        background: linear-gradient(#607B96, #43D9AD, #607B96, #43D9AD);
    }

    .loader span:nth-child(1) {
        filter: blur(5px);
    }

    .loader span:nth-child(2) {
        filter: blur(10px);
    }

    .loader span:nth-child(3) {
        filter: blur(25px);
    }

    .loader span:nth-child(4) {
        filter: blur(50px);
    }

    .loader:after {
        content: '';
        position: absolute;
        top: 10px;
        left: 10px;
        right: 10px;
        bottom: 10px;
        background: #191919;
        border-radius: 50%;
    }
</style>

<script src="flutter_bootstrap.js" async></script>

<div class="main-content" id="loader-content">
    <div class="loader">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>
    <img src="main-icon.png" alt=""/>
</div>
</body>
</html>
